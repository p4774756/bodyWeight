<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#336699" />
  <title>★ 每日體重 ★</title>
  <style>
    :root {
      --bg: #6699cc;
      --bg-tile: #7aa3d3;
      --surface: #ffffff;
      --text: #000080;
      --muted: #333366;
      --accent: #0000cc;
      --accent-hover: #000099;
      --border: #336699;
      --danger: #cc0000;
      --radius: 2px;
      --shadow: 2px 2px 0 #00000033;
      --btn-face: #c0c0c0;
      font-family: "MS PGothic", "MS Gothic", SimSun, "宋体", Georgia, "Times New Roman", Times, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background-color: var(--bg);
      background-image:
        linear-gradient(90deg, transparent 50%, rgba(255, 255, 255, 0.06) 50%),
        linear-gradient(var(--bg-tile) 2px, transparent 2px);
      background-size: 4px 100%, 100% 4px;
      color: var(--text);
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
    }
    a { color: var(--accent); }
    a:visited { color: #800080; }
    .retro-marquee {
      display: block;
      margin: 0 0 10px;
      padding: 4px 0;
      background: #ffffcc;
      color: var(--danger);
      font-weight: bold;
      border: 2px ridge var(--btn-face);
    }
    .retro-counter {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin: 0 0 8px;
      font-family: "Courier New", Courier, monospace;
    }
    .app-main {
      max-width: 720px;
      margin: 0 auto;
    }
    .app-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 0;
    }
    .app-header-titles { flex: 1; min-width: 0; }
    .app-header h1 {
      font-size: 1.5rem;
      font-weight: bold;
      margin: 0 0 4px;
      letter-spacing: 0.02em;
      text-shadow: 1px 1px 0 #fff;
    }
    .app-header .subtitle { color: var(--muted); font-size: 13px; margin: 0 0 12px; }
    .card .subtitle { color: var(--muted); font-size: 12px; margin: 0; }
    .settings-btn {
      flex-shrink: 0;
      margin-top: 2px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: bold;
      border: 2px outset var(--btn-face);
      border-radius: 0;
      background: var(--btn-face);
      color: #000;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: none;
      -webkit-tap-highlight-color: transparent;
    }
    .settings-btn:active { border-style: inset; padding: 5px 11px 3px 13px; }
    .app-header-actions {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .entry-open-btn {
      padding: 4px 14px;
      font-size: 12px;
      font-weight: bold;
      border: 2px outset var(--btn-face);
      border-radius: 0;
      background: #000080;
      color: #ffff00;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: none;
      -webkit-tap-highlight-color: transparent;
    }
    .entry-open-btn:active { border-style: inset; color: #fff; }
    .goal-summary-card .goal-stats { margin-bottom: 0; }
    .goal-summary-card .encourage-line { margin-top: 14px; }
    details.list-fold {
      margin-bottom: 16px;
      padding: 0;
      overflow: hidden;
    }
    details.list-fold summary.list-fold-summary {
      list-style: none;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      background: #336699;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }
    details.list-fold summary.list-fold-summary::-webkit-details-marker { display: none; }
    details.list-fold summary .list-fold-meta {
      font-size: 12px;
      font-weight: normal;
      color: #ccddff;
    }
    details.list-fold summary .list-fold-trailing {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    details.list-fold summary .list-fold-hint-sep {
      color: #99bbdd;
      font-weight: normal;
      user-select: none;
    }
    details.list-fold summary .list-fold-hint {
      font-size: 11px;
      font-weight: normal;
      color: #ffff99;
      user-select: none;
    }
    details.list-fold[open] summary.list-fold-summary {
      border-bottom: 2px groove var(--border);
    }
    .list-fold-inner { padding: 8px 12px 12px; background: #f0f0f0; }
    .list-fold-note {
      margin: 10px 0 0;
      font-size: 11px;
      color: #663300;
      text-align: center;
    }
    .delete-modal.entry-modal { z-index: 212; }
    .entry-modal .delete-modal-panel { max-width: 380px; }
    .card {
      background: var(--surface);
      border-radius: 0;
      padding: 12px;
      box-shadow: var(--shadow);
      border: 3px ridge var(--btn-face);
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: var(--text);
      margin-bottom: 4px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 380px) { .row { grid-template-columns: 1fr; } }
    input[type="date"],
    input[type="number"] {
      width: 100%;
      font-size: 14px;
      padding: 6px 8px;
      border: 2px inset var(--btn-face);
      border-radius: 0;
      background: #fff;
      color: #000;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus {
      outline: 1px dotted #000;
      outline-offset: 1px;
      border-color: #000080;
    }
    .btn {
      width: 100%;
      margin-top: 12px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: bold;
      border: 2px outset var(--btn-face);
      border-radius: 0;
      background: var(--btn-face);
      color: #000;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn:active { border-style: inset; }
    .btn-secondary {
      margin-top: 10px;
      background: #fff;
      color: var(--accent);
      border: 2px outset var(--btn-face);
    }
    .btn-secondary:active { border-style: inset; }
    .btn-ghost {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      font-size: 12px;
      color: var(--accent);
      background: transparent;
      border: none;
      text-decoration: underline;
      cursor: pointer;
      touch-action: manipulation;
    }
    .goal-stats { font-size: 14px; line-height: 1.6; margin: 0 0 10px; }
    .goal-stats p { margin: 0 0 8px; }
    .goal-stats p:last-child { margin-bottom: 0; }
    .goal-stats .highlight { color: #cc0000; font-weight: bold; }
    .encourage-line {
      margin: 0;
      padding: 10px;
      border: 2px inset var(--btn-face);
      background: #ffffcc;
      border-radius: 0;
      font-size: 13px;
      line-height: 1.55;
      color: #000080;
    }
    .chart-wrap {
      position: relative;
      height: 220px;
      margin-top: 8px;
    }
    @media (min-width: 480px) { .chart-wrap { height: 280px; } }
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .list-header h2 { font-size: 14px; margin: 0; font-weight: bold; }
    .entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 4px;
      border-bottom: 1px dotted var(--border);
      gap: 12px;
    }
    .entry:last-child { border-bottom: none; }
    .entry-date { font-weight: bold; font-size: 13px; }
    .entry-weight { color: #0000cc; font-variant-numeric: tabular-nums; font-size: 13px; }
    .entry-del {
      flex-shrink: 0;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: bold;
      border: 2px outset var(--btn-face);
      border-radius: 0;
      background: var(--btn-face);
      color: var(--danger);
      cursor: pointer;
      touch-action: manipulation;
    }
    .entry-del:active { border-style: inset; }
    .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 16px 8px; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: max(20px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(120px);
      background: #ffffcc;
      color: #000080;
      padding: 10px 16px;
      border: 3px ridge var(--btn-face);
      border-radius: 0;
      font-size: 13px;
      font-weight: bold;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s ease, opacity 0.25s ease;
      z-index: 10;
      max-width: calc(100vw - 32px);
      text-align: center;
      box-shadow: 4px 4px 0 #00000044;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .delete-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }
    #deleteModal.delete-modal {
      z-index: 212;
    }
    .delete-modal.open { display: flex; }
    .delete-modal.settings-modal { z-index: 210; }
    .delete-modal-panel.settings-modal-panel {
      max-width: 400px;
      max-height: min(88dvh, 640px);
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }
    .settings-modal-scroll {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      background: #c0c0c0;
    }
    .settings-modal-scroll .btn { margin-top: 12px; }
    .settings-modal-lead {
      margin: 0 0 12px;
      font-size: 12px;
      color: #000;
      line-height: 1.45;
    }
    .settings-modal-scroll > h3 { margin: 0 0 6px; font-size: 15px; font-weight: bold; }
    .btn-close-settings {
      width: 100%;
      margin: 0;
      padding: 10px 16px;
      border: none;
      border-top: 2px groove var(--btn-face);
      background: var(--btn-face);
      font-size: 13px;
      font-weight: bold;
      color: #000;
      cursor: pointer;
      flex-shrink: 0;
      border-radius: 0;
      touch-action: manipulation;
    }
    .btn-close-settings:active { border-top-style: solid; background: #a0a0a0; }
    .delete-modal-backdrop {
      position: absolute;
      inset: 0;
      background: #000080;
      opacity: 0.35;
    }
    .delete-modal-panel {
      position: relative;
      width: 100%;
      max-width: 340px;
      background: var(--surface);
      border-radius: 0;
      padding: 16px;
      box-shadow: 6px 6px 0 #00000055;
      border: 3px ridge var(--btn-face);
    }
    .delete-modal-panel h3 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: bold;
    }
    .delete-modal-panel p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .delete-modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .delete-modal-actions button {
      padding: 8px 10px;
      font-size: 12px;
      font-weight: bold;
      border-radius: 0;
      cursor: pointer;
      touch-action: manipulation;
      border: 2px outset var(--btn-face);
      background: var(--btn-face);
      color: #000;
    }
    .delete-modal-actions .btn-confirm-del {
      border: 2px outset var(--btn-face);
      background: #cc0000;
      color: #fff;
    }
    .delete-modal-actions .btn-confirm-del:active {
      border-style: inset;
    }
    .delete-modal.merge-modal { z-index: 220; }
    .delete-modal.auth-modal { z-index: 215; }
    .delete-modal-panel.merge-modal-panel,
    .delete-modal-panel.auth-modal-panel {
      max-width: 380px;
    }
    .merge-modal-summary {
      font-size: 12px;
      color: var(--text);
      line-height: 1.55;
      margin: 0 0 12px;
      padding: 8px 10px;
      background: #f0f0f0;
      border-radius: 0;
      border: 2px inset var(--btn-face);
    }
    .merge-modal-summary strong { color: #000080; }
    .auth-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .auth-tabs button {
      flex: 1;
      padding: 6px 8px;
      border-radius: 0;
      border: 2px outset var(--btn-face);
      background: var(--btn-face);
      font-weight: bold;
      font-size: 12px;
      color: #000;
      cursor: pointer;
      touch-action: manipulation;
    }
    .auth-tabs button[aria-selected="true"] {
      background: #000080;
      color: #ffff00;
      border: 2px inset var(--btn-face);
    }
    .auth-error {
      font-size: 12px;
      color: var(--danger);
      margin: 0 0 8px;
      min-height: 1.2em;
      font-weight: bold;
    }
    .auth-logged-panel {
      font-size: 13px;
      color: #000;
      line-height: 1.5;
    }
    .auth-logged-panel .auth-email-line {
      font-weight: bold;
      color: #000080;
      word-break: break-all;
      margin-bottom: 8px;
    }
    .auth-sync-hint {
      font-size: 11px;
      color: #333;
      line-height: 1.45;
      margin: 8px 0 12px;
    }
    .merge-actions-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .merge-actions-stack .btn-merge-local {
      border: 2px outset var(--btn-face);
      background: #000080;
      color: #ffff00;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: bold;
      border-radius: 0;
      cursor: pointer;
      touch-action: manipulation;
    }
    .merge-actions-stack .btn-merge-cloud {
      border: 2px outset var(--btn-face);
      background: var(--btn-face);
      color: #000080;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: bold;
      border-radius: 0;
      cursor: pointer;
      touch-action: manipulation;
    }
    .merge-actions-stack button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .merge-actions-stack .btn-merge-local:active:not(:disabled) {
      background: var(--accent-hover);
    }
    .merge-actions-stack .btn-merge-cloud:active:not(:disabled) {
      background: rgba(13, 148, 136, 0.08);
    }
    .merge-actions-stack .btn-merge-cancel {
      margin-top: 4px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: bold;
      color: var(--accent);
      background: transparent;
      border: none;
      border-radius: 0;
      cursor: pointer;
      touch-action: manipulation;
      text-decoration: underline;
    }
    .merge-actions-stack .btn-merge-cancel:active {
      color: var(--text);
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      font-size: 14px;
      padding: 6px 8px;
      border: 2px inset var(--btn-face);
      border-radius: 0;
      background: #fff;
      color: #000;
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-row">
      <div class="app-header-titles">
        <h1 id="appTitle">每日體重</h1>
        <p id="appSubtitle" class="subtitle">資料存在這台裝置上，不會上傳伺服器</p>
      </div>
      <div class="app-header-actions">
        <button type="button" class="settings-btn" id="accountBtn" aria-haspopup="dialog" aria-controls="authModal" aria-expanded="false">帳號</button>
        <button type="button" class="entry-open-btn" id="entryOpenBtn" aria-haspopup="dialog" aria-controls="entryModal" aria-expanded="false">新增</button>
        <button type="button" class="settings-btn" id="settingsBtn" aria-haspopup="dialog" aria-controls="settingsModal" aria-expanded="false">設定</button>
      </div>
    </div>
  </header>

  <marquee class="retro-marquee" scrollamount="4">～～ 歡迎光臨「每日體重」網頁 ～～ 建議用體重計搭配使用 ~~~ 紀錄越多曲線越好看 ~~~</marquee>
  <p class="retro-counter" id="visitorCounterLine" aria-live="polite">你是第 <strong id="visitorCountDisplay">------</strong> 位訪客（開站以來每次開啟此頁會 +1）</p>

  <main class="app-main">
  <section id="viewWeight" class="app-view">
  <div class="card">
    <h2 style="margin:0 0 4px;font-size:15px;font-weight:bold;">體重曲線</h2>
    <p class="subtitle" style="margin:0 0 8px;">依日期排序，至少兩筆會比較好看</p>
    <div class="chart-wrap">
      <canvas id="chart" aria-label="體重折線圖"></canvas>
    </div>
  </div>

  <div class="card goal-summary-card" id="goalSummaryCard">
    <div class="list-header">
      <h2>目標進度</h2>
    </div>
    <div id="goalSummaryMain" class="goal-stats"></div>
    <p id="encourageLineMain" class="encourage-line" aria-live="polite"></p>
  </div>

  <details class="card list-fold">
    <summary class="list-fold-summary" title="點擊展開或收合紀錄">
      <span>紀錄列表</span>
      <span class="list-fold-trailing">
        <span class="list-fold-meta" id="listFoldMeta">共 0 筆</span>
        <span class="list-fold-hint-sep" aria-hidden="true">·</span>
        <span class="list-fold-hint">點開查看</span>
      </span>
    </summary>
    <div class="list-fold-inner">
      <div id="list"></div>
      <p class="list-fold-note" id="listFoldNote" hidden></p>
    </div>
  </details>
  </section>
  </main>

  <div class="toast" id="toast" role="status"></div>

  <div id="entryModal" class="delete-modal entry-modal" hidden aria-hidden="true">
    <div class="delete-modal-backdrop" id="entryModalBackdrop" tabindex="-1"></div>
    <div class="delete-modal-panel" role="dialog" aria-modal="true" aria-labelledby="entryModalTitle">
      <h3 id="entryModalTitle" style="margin:0 0 14px;font-size:1.1rem;">新增體重紀錄</h3>
      <div class="row">
        <div>
          <label for="date">日期</label>
          <input type="date" id="date" />
        </div>
        <div>
          <label for="weight">體重（公斤）</label>
          <input type="number" id="weight" inputmode="decimal" step="0.1" min="1" max="500" placeholder="例如 65.5" />
        </div>
      </div>
      <button type="button" class="btn" id="saveBtn">儲存紀錄</button>
      <button type="button" class="btn-ghost" id="entryModalCancelBtn">取消</button>
    </div>
  </div>

  <div id="settingsModal" class="delete-modal settings-modal" hidden aria-hidden="true">
    <div class="delete-modal-backdrop" id="settingsModalBackdrop" tabindex="-1"></div>
    <div class="delete-modal-panel settings-modal-panel" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
      <div class="settings-modal-scroll">
        <h3 id="settingsModalTitle">體重目標</h3>
        <p class="settings-modal-lead">偶爾來調整目標或看進度即可，不必每天盯著。</p>
        <div class="row">
          <div>
            <label for="goalDate">目標日期</label>
            <input type="date" id="goalDate" />
          </div>
          <div>
            <label for="goalWeight">目標體重（公斤）</label>
            <input type="number" id="goalWeight" inputmode="decimal" step="0.1" min="1" max="500" placeholder="例如 62" />
          </div>
        </div>
        <button type="button" class="btn" id="goalSaveBtn">儲存目標</button>
        <button type="button" class="btn-ghost" id="goalClearBtn">清除目標</button>
        <div id="goalStats" class="goal-stats" style="margin-top:16px;"></div>
        <p id="encourageLine" class="encourage-line" aria-live="polite"></p>
      </div>
      <button type="button" class="btn-close-settings" id="settingsCloseBtn">關閉</button>
    </div>
  </div>

  <div id="deleteModal" class="delete-modal" hidden aria-hidden="true">
    <div class="delete-modal-backdrop" id="deleteModalBackdrop" tabindex="-1"></div>
    <div class="delete-modal-panel" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
      <h3 id="deleteModalTitle">刪除紀錄</h3>
      <p id="deleteModalMsg"></p>
      <div class="delete-modal-actions">
        <button type="button" id="deleteModalCancel">取消</button>
        <button type="button" class="btn-confirm-del" id="deleteModalOk">確定刪除</button>
      </div>
    </div>
  </div>

  <div id="mergeModal" class="delete-modal merge-modal" hidden aria-hidden="true">
    <div class="delete-modal-backdrop" id="mergeModalBackdrop" tabindex="-1"></div>
    <div class="delete-modal-panel merge-modal-panel" role="dialog" aria-modal="true" aria-labelledby="mergeModalTitle">
      <h3 id="mergeModalTitle">與雲端同步</h3>
      <p id="mergeModalLead" class="settings-modal-lead" style="margin-top:0">請選擇要以哪一邊為準；未選的一邊會被覆蓋。</p>
      <p id="mergeModalSummary" class="merge-modal-summary" aria-live="polite"></p>
      <div class="merge-actions-stack">
        <button type="button" class="btn-merge-local" id="mergePickLocal">以本機為準（覆蓋雲端）</button>
        <button type="button" class="btn-merge-cloud" id="mergePickCloud">以雲端為準（覆蓋本機）</button>
        <button type="button" class="btn-merge-cancel" id="mergeModalCancel">取消</button>
      </div>
    </div>
  </div>

  <div id="authModal" class="delete-modal auth-modal" hidden aria-hidden="true">

  <script>
    const STORAGE_KEY = "bodyWeight.entries.v1";
    const GOAL_KEY = "bodyWeight.goal.v1";
    const firebaseConfig = {
      apiKey: "AIzaSyDm_1r1vvsqbuWUbWShbc5IFIRBjq6IYpk",
      authDomain: "my-habbit-record.firebaseapp.com",
      projectId: "my-habbit-record",
      storageBucket: "my-habbit-record.firebasestorage.app",
      messagingSenderId: "72425211348",
      appId: "1:72425211348:web:68954eec17b66208dc4241",
      measurementId: "G-EXFQFQ75H0",
    };

    firebase.initializeApp(firebaseConfig);
    const firebaseAuth = firebase.auth();
    const firebaseDb = firebase.firestore();
    firebaseAuth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

    /** 寫入本機時暫停觸發雲端上傳（例如正從雲端覆蓋本機） */
    let suppressCloudPush = false;
    let cloudPushTimer = null;
    let mergeChoiceResolver = null;

    function bundleDocRef(uid) {
      return firebaseDb.collection("users").doc(uid).collection("sync").doc("bundle");
    }

    function visitorCounterRef() {
      return firebaseDb.collection("siteStats").doc("visitorCounter");
    }

    function formatVisitorCount(n) {
      const v = Math.max(0, Math.floor(Number(n)) || 0);
      return String(v).padStart(6, "0");
    }

    /** 每次載入頁面累加一次並顯示目前總數（需已部署 Firestore 規則） */
    async function bumpVisitorCounter() {
      const el = document.getElementById("visitorCountDisplay");
      if (!el) return;
      try {
        const ref = visitorCounterRef();
        await ref.set(
          { count: firebase.firestore.FieldValue.increment(1) },
          { merge: true }
        );
        const snap = await ref.get();
        const c = snap.exists && typeof snap.data().count === "number" ? snap.data().count : null;
        el.textContent = c != null ? formatVisitorCount(c) : "------";
      } catch (e) {
        console.error(e);
        try {
          const snap = await visitorCounterRef().get();
          const c = snap.exists && typeof snap.data().count === "number" ? snap.data().count : null;
          el.textContent = c != null ? formatVisitorCount(c) : "------";
        } catch {
          el.textContent = "------";
        }
      }
    }

    /** @returns {{ entries: Entry[], goal: Goal }} */
    function collectLocalBundle() {
      return {
        entries: loadEntries(),
        goal: loadGoal(),
      };
    }

    function localBundleHasMeaningfulData(b) {
      const g = b.goal;
      const hasGoal = !!(g && g.targetDate && g.targetWeight != null);
      return (b.entries && b.entries.length > 0) || hasGoal;
    }

    function cloudBundleHasMeaningfulData(data) {
      if (!data) return false;
      const g = data.goal;
      const hasGoal = g && typeof g.targetDate === "string" && g.targetWeight != null;
      const entries = Array.isArray(data.entries) ? data.entries : [];
      return entries.length > 0 || hasGoal;
    }

    function bundlesFingerprint(b) {
      return JSON.stringify({
        entries: b.entries || [],
        goal: b.goal || { targetDate: null, targetWeight: null },
      });
    }

    function formatFirestoreTime(ts) {
      if (!ts) return "—";
      let ms;
      if (typeof ts.toMillis === "function") ms = ts.toMillis();
      else if (ts.seconds != null) ms = ts.seconds * 1000;
      else return "—";
      return new Intl.DateTimeFormat("zh-Hant", {
        dateStyle: "medium",
        timeStyle: "short",
      }).format(new Date(ms));
    }

    /** @param {firebase.firestore.DocumentSnapshot} snap */
    function readBundleFromSnap(snap) {
      if (!snap.exists) return null;
      const d = snap.data();
      return {
        entries: Array.isArray(d.entries) ? d.entries : [],
        goal:
          d.goal && typeof d.goal === "object"
            ? {
                targetDate: typeof d.goal.targetDate === "string" ? d.goal.targetDate : null,
                targetWeight:
                  typeof d.goal.targetWeight === "number" && !Number.isNaN(d.goal.targetWeight) ? d.goal.targetWeight : null,
              }
            : { targetDate: null, targetWeight: null },
        updatedAt: d.updatedAt || null,
      };
    }

    /** @param {{ entries?: Entry[], goal?: Goal }} cloud */
    function applyCloudBundleToLocal(cloud) {
      suppressCloudPush = true;
      try {
        if (Array.isArray(cloud.entries)) {
          const cleaned = cloud.entries
            .filter((e) => e && typeof e.date === "string" && typeof e.weight === "number")
            .map((e) => ({ date: e.date, weight: e.weight }));
          localStorage.setItem(STORAGE_KEY, JSON.stringify(cleaned));
        } else {
          localStorage.setItem(STORAGE_KEY, JSON.stringify([]));
        }
        const g = cloud.goal && typeof cloud.goal === "object" ? cloud.goal : {};
        const targetDate =
          typeof g.targetDate === "string" && /^\d{4}-\d{2}-\d{2}$/.test(g.targetDate) ? g.targetDate : null;
        const tw = parseFloat(String(g.targetWeight ?? "").replace(",", "."));
        const targetWeight = !Number.isNaN(tw) && tw > 0 ? tw : null;
        localStorage.setItem(GOAL_KEY, JSON.stringify({ targetDate, targetWeight }));
      } finally {
        suppressCloudPush = false;
      }
    }

    async function pushLocalBundleToCloud(uid) {
      const b = collectLocalBundle();
      await bundleDocRef(uid).set({
        entries: b.entries,
        goal: b.goal,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    }

    function scheduleCloudPushIfAuthed() {
      const u = firebaseAuth.currentUser;
      if (!u || suppressCloudPush) return;
      clearTimeout(cloudPushTimer);
      cloudPushTimer = setTimeout(() => {
        cloudPushTimer = null;
        pushLocalBundleToCloud(u.uid).catch((e) => {
          console.error(e);
          showToast("雲端同步失敗，請稍後再試");
        });
      }, 650);
    }

    function authErrorMessage(code) {
      const map = {
        "auth/email-already-in-use": "此電子郵件已被註冊",
        "auth/invalid-email": "電子郵件格式不正確",
        "auth/weak-password": "密碼強度不足",
        "auth/user-not-found": "找不到此帳號",
        "auth/wrong-password": "密碼錯誤",
        "auth/invalid-credential": "帳號或密碼錯誤",
        "auth/too-many-requests": "嘗試太多次，請稍後再試",
      };
      return map[code] || "發生錯誤，請稍後再試";
    }

    /** @returns {Promise<'local'|'cloud'|'cancel'>} */
    function openMergeModalAndWait(cloudData) {
      return new Promise((resolve) => {
        mergeChoiceResolver = resolve;
        const hasCloud = cloudBundleHasMeaningfulData(cloudData);
        const localB = collectLocalBundle();
        const hasLocal = localBundleHasMeaningfulData(localB);
        const cloudTimeStr = cloudData && cloudData.updatedAt ? formatFirestoreTime(cloudData.updatedAt) : "尚無紀錄";
        const same =
          hasCloud &&
          hasLocal &&
          cloudData &&
          bundlesFingerprint({
            entries: cloudData.entries,
            goal: cloudData.goal,
          }) === bundlesFingerprint(localB);

        const mergeModal = document.getElementById("mergeModal");
        const mergeSummary = document.getElementById("mergeModalSummary");
        const pickLocal = document.getElementById("mergePickLocal");
        const pickCloud = document.getElementById("mergePickCloud");
        const lead = document.getElementById("mergeModalLead");
        pickLocal.disabled = false;
        pickCloud.disabled = false;

        let summaryHtml = `<strong>雲端最近更新時間：</strong>${escapeHtml(cloudTimeStr)}<br>`;
        summaryHtml += `<strong>本機：</strong>體重紀錄 ${localB.entries.length} 筆`;
        if (same) summaryHtml += "<br><span style=\"color:var(--muted)\">（本機與雲端內容相同，仍可依需要選擇覆蓋方向）</span>";
        mergeSummary.innerHTML = summaryHtml;

        if (!hasCloud && !hasLocal) {
          lead.textContent = "本機與雲端皆無資料，將直接繼續。";
          pickLocal.textContent = "繼續";
          pickCloud.textContent = "繼續";
          pickCloud.disabled = true;
          pickLocal.disabled = false;
        } else if (!hasCloud) {
          lead.textContent = "雲端尚無備份。建議將本機上傳；若仍選雲端，本機資料將被清空。";
          pickLocal.textContent = "以本機為準（上傳到雲端）";
          pickCloud.textContent = "以雲端為準（本機將清空）";
        } else if (!hasLocal) {
          lead.textContent = "本機尚無資料，建議從雲端下載。";
          pickLocal.textContent = "以本機為準（會清空雲端）";
          pickCloud.textContent = "以雲端為準（下載到本機）";
        } else {
          lead.textContent = "請選擇要以哪一邊為準；另一邊會被覆蓋。";
          pickLocal.textContent = "以本機為準（覆蓋雲端）";
          pickCloud.textContent = "以雲端為準（覆蓋本機）";
          pickLocal.disabled = !hasLocal;
          pickCloud.disabled = !hasCloud;
        }

        mergeModal.hidden = false;
        mergeModal.classList.add("open");
        mergeModal.setAttribute("aria-hidden", "false");
      });
    }

    function resolveMerge(choice) {
      const mergeModal = document.getElementById("mergeModal");
      mergeModal.classList.remove("open");
      mergeModal.hidden = true;
      mergeModal.setAttribute("aria-hidden", "true");
      const r = mergeChoiceResolver;
      mergeChoiceResolver = null;
      if (r) r(choice);
    }

    function closeAuthModalIfOpen() {
      const el = document.getElementById("authModal");
      if (!el || !el.classList.contains("open")) return;
      el.classList.remove("open");
      el.hidden = true;
      el.setAttribute("aria-hidden", "true");
      const ab = document.getElementById("accountBtn");
      if (ab) ab.setAttribute("aria-expanded", "false");

    /** 讀取雲端並開啟合併對話框，依選擇以本機或雲端為主同步（僅在使用者按「資料同步…」時呼叫） */
    async function runInteractiveCloudSync(user) {
      if (!user) return;
      let snap;
      try {
        snap = await bundleDocRef(user.uid).get();
      } catch (e) {
        console.error(e);
        showToast("無法讀取雲端，請檢查網路與規則設定");
        return;
      }
      const cloudData = readBundleFromSnap(snap);
      const choice = await openMergeModalAndWait(cloudData);
      if (choice === "cancel") {
        showToast("已取消同步");
        return;
      }
      try {
        if (choice === "local") {
          await pushLocalBundleToCloud(user.uid);
        } else if (cloudData && cloudBundleHasMeaningfulData(cloudData)) {
          applyCloudBundleToLocal(cloudData);
        } else {
          applyCloudBundleToLocal({
            entries: [],
            goal: { targetDate: null, targetWeight: null },
          });
        }
      } catch (e) {
        console.error(e);
        showToast("同步失敗，請稍後再試");
        return;
      }
      refresh();
      syncGoalFormFromStorage();
      showToast("同步完成");
    }

    /** 登入狀態變更時：若帳號視窗正開著，切到已登入畫面（不自動跳出同步選擇） */
    function syncAuthModalLoggedStateIfOpen(user) {

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /** @typedef {{ date: string, weight: number }} Entry */
    /** @typedef {{ targetDate: string | null, targetWeight: number | null }} Goal */

    function loadEntries() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed
          .filter((e) => e && typeof e.date === "string" && typeof e.weight === "number")
          .map((e) => ({ date: e.date, weight: e.weight }));
      } catch {
        return [];
      }
    }

    /** @param {Entry[]} entries */
    function saveEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      scheduleCloudPushIfAuthed();
    }

    /** @param {Entry[]} entries */
    function sortByDate(entries) {
      return [...entries].sort((a, b) => a.date.localeCompare(b.date));
    }

    /** @returns {Goal} */
    function loadGoal() {
      try {
        const raw = localStorage.getItem(GOAL_KEY);
        if (!raw) return { targetDate: null, targetWeight: null };
        const o = JSON.parse(raw);
        const targetDate =
          typeof o.targetDate === "string" && /^\d{4}-\d{2}-\d{2}$/.test(o.targetDate) ? o.targetDate : null;
        const tw = parseFloat(String(o.targetWeight ?? "").replace(",", "."));
        const targetWeight = !Number.isNaN(tw) && tw > 0 ? tw : null;
        return { targetDate, targetWeight };
      } catch {
        return { targetDate: null, targetWeight: null };
      }
    }

    /** @param {Goal} goal */
    function saveGoal(goal) {
      localStorage.setItem(GOAL_KEY, JSON.stringify(goal));
      scheduleCloudPushIfAuthed();
    }

    function parseISODateLocal(iso) {
      const p = iso.split("-").map(Number);
      return new Date(p[0], p[1] - 1, p[2]);
    }

    /** @param {Entry[]} entries */
    function getLatestEntry(entries) {
      const s = sortByDate(entries);
      if (!s.length) return null;
      return s[s.length - 1];
    }

        const snap = await bundleDocRef(u.uid).get();
        const d = readBundleFromSnap(snap);
        authCloudTimeLine.textContent = "雲端最近更新：" + (d && d.updatedAt ? formatFirestoreTime(d.updatedAt) : "—");
      } catch (e) {
        console.error(e);
        authCloudTimeLine.textContent = "雲端最近更新：無法讀取";
      }
    }

    function openAuthModal() {
      authFormError.textContent = "";
      const u = firebaseAuth.currentUser;
      if (u) {
        authFormBlock.hidden = true;
        authLoggedBlock.hidden = false;
        authModalTitle.textContent = "帳號";
        authLoggedEmail.textContent = u.email || "";
        void refreshAuthLoggedPanel();
      } else {
        authFormBlock.hidden = false;
        authLoggedBlock.hidden = true;
        authModalTitle.textContent = "登入／註冊";
        syncAuthFormMode(false);
      }
      authModal.hidden = false;
      authModal.classList.add("open");
      authModal.setAttribute("aria-hidden", "false");
      accountBtn.setAttribute("aria-expanded", "true");
    }

    const LIST_RECENT_MAX = 8;

    let pendingDeleteDate = null;

    function openEntryModal() {
      dateInput.value = todayISO();
      weightInput.value = "";
      entryModal.hidden = false;
      entryModal.classList.add("open");
      entryModal.setAttribute("aria-hidden", "false");
      entryOpenBtn.setAttribute("aria-expanded", "true");
      weightInput.focus();
    }

    function closeEntryModal() {
      entryModal.classList.remove("open");
      entryModal.hidden = true;
      entryModal.setAttribute("aria-hidden", "true");
      entryOpenBtn.setAttribute("aria-expanded", "false");
    }

    function openSettingsModal() {
      settingsModal.hidden = false;
      settingsModal.classList.add("open");
      settingsModal.setAttribute("aria-hidden", "false");
      settingsBtn.setAttribute("aria-expanded", "true");
      syncGoalFormFromStorage();
      renderGoalInsight();
    }

    function closeSettingsModal() {
      settingsModal.classList.remove("open");
      settingsModal.hidden = true;
      settingsModal.setAttribute("aria-hidden", "true");
      settingsBtn.setAttribute("aria-expanded", "false");
    }

    function openDeleteModal(date) {
      pendingDeleteDate = date;
      deleteModalTitle.textContent = "刪除紀錄";
      deleteModalMsg.textContent = `確定要刪除 ${date} 的體重紀錄嗎？此動作無法復原。`;
      deleteModal.hidden = false;
      deleteModal.classList.add("open");
      deleteModal.setAttribute("aria-hidden", "false");
    }

    function closeDeleteModal() {
      pendingDeleteDate = null;
      deleteModal.classList.remove("open");
      deleteModal.hidden = true;
      deleteModal.setAttribute("aria-hidden", "true");
    }

    function runPendingDelete() {
      if (!pendingDeleteDate) return;
      const date = pendingDeleteDate;
      closeDeleteModal();
      const entries = loadEntries().filter((e) => e.date !== date);
      saveEntries(entries);
      showToast("已刪除");
      refresh();
    }

    deleteModalCancel.addEventListener("click", closeDeleteModal);
    deleteModalBackdrop.addEventListener("click", closeDeleteModal);
    deleteModalOk.addEventListener("click", runPendingDelete);
    entryOpenBtn.addEventListener("click", openEntryModal);
    entryModalBackdrop.addEventListener("click", closeEntryModal);
    entryModalCancelBtn.addEventListener("click", closeEntryModal);
    settingsBtn.addEventListener("click", openSettingsModal);
    settingsModalBackdrop.addEventListener("click", closeSettingsModal);
    settingsCloseBtn.addEventListener("click", closeSettingsModal);
    document.addEventListener("keydown", (ev) => {
      if (ev.key !== "Escape") return;
      if (mergeModal.classList.contains("open")) {
        ev.preventDefault();
        resolveMerge("cancel");
        return;
      }
      if (authModal.classList.contains("open")) {
        ev.preventDefault();
        closeAuthModalIfOpen();
        return;
      }
      if (entryModal.classList.contains("open")) {
        ev.preventDefault();
        closeEntryModal();
        return;
      }
      if (deleteModal.classList.contains("open")) {
        ev.preventDefault();
        closeDeleteModal();
        return;
      }
      if (settingsModal.classList.contains("open")) {
        ev.preventDefault();
        closeSettingsModal();
      }
    });

    function todayISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function daysFromTodayTo(targetIso) {
      const a = parseISODateLocal(todayISO());
      const b = parseISODateLocal(targetIso);
      return Math.round((b.getTime() - a.getTime()) / 86400000);
    }

    function syncGoalFormFromStorage() {
      const g = loadGoal();
      goalDateInput.value = g.targetDate || "";
      goalWeightInput.value = g.targetWeight != null ? String(g.targetWeight) : "";
    }

    syncGoalFormFromStorage();

    function renderGoalInsight() {
      const goal = loadGoal();
      const entries = loadEntries();

      if (!goal.targetDate || goal.targetWeight == null) {
        goalStatsEl.innerHTML =
          '<p class="empty" style="padding:8px 0;margin:0;">填寫目標日期與目標體重並儲存後，這裡會顯示還差多少與倒數天數。</p>';
        goalSummaryMainEl.innerHTML =
          '<p class="empty" style="padding:0;margin:0;">尚未設定目標，請點右上角「設定」新增日期與目標體重。</p>';
        const enc = pickEncouragement(ENC.noGoal);
        encourageLineEl.textContent = enc;
        encourageLineMainEl.textContent = enc;
        return;
      }

      const remain = daysFromTodayTo(goal.targetDate);
      let dayHtml = "";
      if (remain > 0) {
        dayHtml = `<p>距離目標日（${goal.targetDate}）還有 <span class="highlight">${remain}</span> 天。</p>`;
      } else if (remain === 0) {
        dayHtml = `<p>目標日就是<span class="highlight">今天</span>（${goal.targetDate}）。</p>`;
      } else {
        dayHtml = `<p>目標日（${goal.targetDate}）已過 <span class="highlight">${-remain}</span> 天。</p>`;
      }

      const latest = getLatestEntry(entries);
      let weightHtml = "";
      /** @type {string[]} */
      let encPool = ENC.genericClose;

      if (!latest) {
        weightHtml = "<p>尚無體重紀錄，先記幾筆後就能看到與目標的距離。</p>";
        encPool = ENC.noEntry;
      } else {
        const cur = latest.weight;
        const diff = cur - goal.targetWeight;
        const abs = Math.abs(diff);
        if (abs < 0.2) {
          weightHtml = `<p>最近一筆：<strong>${cur.toFixed(1)} kg</strong>（${latest.date}），與目標 <strong>${goal.targetWeight.toFixed(1)} kg</strong> 幾乎一樣。</p>`;
          encPool = ENC.achieved;
        } else if (diff > 0) {
          weightHtml = `<p>最近一筆：<strong>${cur.toFixed(1)} kg</strong>（${latest.date}）。<br>與目標體重相比，還多出 <span class="highlight">${abs.toFixed(1)} kg</span>。</p>`;
          encPool = ENC.needLose;
        } else {
          weightHtml = `<p>最近一筆：<strong>${cur.toFixed(1)} kg</strong>（${latest.date}）。<br>已比目標再輕約 <span class="highlight">${abs.toFixed(1)} kg</span>。</p>`;
          encPool = ENC.belowTarget;
        }
      }

      if (remain < 0 && latest) {
        const diff = latest.weight - goal.targetWeight;
        if (Math.abs(diff) >= 0.2) encPool = ENC.pastDate;
      }

      const statsJoined = dayHtml + weightHtml;
      const encText = pickEncouragement(encPool);
      goalStatsEl.innerHTML = statsJoined;
      goalSummaryMainEl.innerHTML = statsJoined;
      encourageLineEl.textContent = encText;
      encourageLineMainEl.textContent = encText;
    }

    let chartInstance = null;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("show"), 2200);
    }

    function renderList(entries) {
      const sorted = sortByDate(entries).reverse();
      const total = sorted.length;
      listFoldMeta.textContent = total === 0 ? "尚無紀錄" : `共 ${total} 筆`;

      if (total === 0) {
        listEl.innerHTML = '<p class="empty" style="padding:12px 0;">尚無紀錄，點「新增」開始</p>';
        listFoldNote.hidden = true;
        return;
      }

      const slice = sorted.slice(0, LIST_RECENT_MAX);
      listEl.innerHTML = slice
        .map(
          (e) => `
        <div class="entry" data-date="${e.date}">
          <div>
            <div class="entry-date">${e.date}</div>
            <div class="entry-weight">${e.weight.toFixed(1)} kg</div>
          </div>
          <button type="button" class="entry-del" data-date="${e.date}">刪除</button>
        </div>`
        )
        .join("");

      if (total > LIST_RECENT_MAX) {
        listFoldNote.textContent = `僅列出最近 ${LIST_RECENT_MAX} 筆，其餘 ${total - LIST_RECENT_MAX} 筆仍安全存在手機裡。`;
        listFoldNote.hidden = false;
      } else {
        listFoldNote.hidden = true;
      }
    }

    function renderChart(entries) {
      const sorted = sortByDate(entries);
      const labels = sorted.map((e) => e.date);
      const data = sorted.map((e) => e.weight);
      const goal = loadGoal();
      const showTargetLine = goal.targetWeight != null && labels.length > 0;

      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }

      if (sorted.length === 0) {
        chartInstance = new Chart(chartCanvas, {
          type: "line",
          data: { labels: [], datasets: [{ data: [] }] },
          options: { plugins: { legend: { display: false } } },
        });
        return;
      }

      const datasets = [
        {
          label: "體重 (kg)",
          data,
          borderColor: "#0000aa",
          backgroundColor: "rgba(0, 0, 170, 0.18)",
          fill: true,
          tension: 0.2,
          pointRadius: 3,
          pointHoverRadius: 5,
          borderWidth: 2,
        },
      ];
      if (showTargetLine && goal.targetWeight != null) {
        datasets.push({
          label: "目標體重",
          data: labels.map(() => goal.targetWeight),
          borderColor: "#cc0000",
          backgroundColor: "transparent",
          borderDash: [8, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          borderWidth: 2,
        });
      }

      chartInstance = new Chart(chartCanvas, {
        type: "line",
        data: {
          labels,
          datasets,
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxRotation: 45, minRotation: 0, font: { size: 10 }, color: "#000080" },
            },
            y: {
              beginAtZero: false,
              ticks: { font: { size: 11 }, color: "#000080" },
              grid: { color: "rgba(0, 0, 128, 0.12)" },
            },
          },
          plugins: {
            legend: { display: showTargetLine },
            tooltip: {
              callbacks: {
                label(ctx) {
                  const v = ctx.parsed.y;
                  return v != null ? `體重：${Number(v).toFixed(1)} kg` : "";
                },
              },
            },
          },
        },
      });
    }

    function refresh() {
      const entries = loadEntries();
      renderList(entries);
      renderChart(entries);
      renderGoalInsight();
    }

    goalSaveBtn.addEventListener("click", () => {
      const td = goalDateInput.value;
      const tw = parseFloat(String(goalWeightInput.value).replace(",", "."));
      if (!td) {
        showToast("請選擇目標日期");
        return;
      }
      if (Number.isNaN(tw) || tw <= 0) {
        showToast("請輸入有效目標體重");
        return;
      }
      saveGoal({ targetDate: td, targetWeight: tw });
      showToast("目標已儲存");
      refresh();
    });

    goalClearBtn.addEventListener("click", () => {
      saveGoal({ targetDate: null, targetWeight: null });
      goalDateInput.value = "";
      goalWeightInput.value = "";
      showToast("已清除目標");
      refresh();
    });

    saveBtn.addEventListener("click", () => {
      const date = dateInput.value;
      const w = parseFloat(String(weightInput.value).replace(",", "."));
      if (!date) {
        showToast("請選擇日期");
        return;
      }
      if (Number.isNaN(w) || w <= 0) {
        showToast("請輸入有效體重");
        return;
      }
      let entries = loadEntries();
      const idx = entries.findIndex((e) => e.date === date);
      if (idx >= 0) {
        entries[idx] = { date, weight: w };
        showToast("已更新該日紀錄");
      } else {
        entries.push({ date, weight: w });
        showToast("已儲存");
      }
      saveEntries(entries);
      weightInput.value = "";
      closeEntryModal();
      refresh();
    });

    listEl.addEventListener("click", (ev) => {
      const btn = ev.target.closest(".entry-del");
      if (!btn) return;
      const date = btn.getAttribute("data-date");
      if (!date) return;
      openDeleteModal(date);
    });

    function refreshLoginSubtitles() {
      const loggedIn = !!firebaseAuth.currentUser;
      appSubtitle.textContent = loggedIn
        ? "已登入：體重紀錄會與雲端同步"
        : "資料存在這台裝置上，未登入則不會上傳伺服器";
    }

    document.getElementById("mergePickLocal").addEventListener("click", () => resolveMerge("local"));
    document.getElementById("mergePickCloud").addEventListener("click", () => resolveMerge("cloud"));
    document.getElementById("mergeModalCancel").addEventListener("click", () => resolveMerge("cancel"));
    document.getElementById("mergeModalBackdrop").addEventListener("click", () => resolveMerge("cancel"));

    accountBtn.addEventListener("click", () => openAuthModal());
    authModalBackdrop.addEventListener("click", () => closeAuthModalIfOpen());
    authModalCloseBtn.addEventListener("click", () => closeAuthModalIfOpen());
    authTabLogin.addEventListener("click", () => syncAuthFormMode(false));
    authTabRegister.addEventListener("click", () => syncAuthFormMode(true));

    authSubmitBtn.addEventListener("click", async () => {
      authFormError.textContent = "";
      const isReg = authTabRegister.getAttribute("aria-selected") === "true";
      try {
        if (isReg) {
          const email = authEmailReg.value.trim();
          const p1 = authPassReg.value;
          const p2 = authPassReg2.value;
          if (!email) {
            authFormError.textContent = "請輸入電子郵件";
            return;
          }
          if (p1.length < 6) {
            authFormError.textContent = "密碼至少 6 個字元";
            return;
          }
          if (p1 !== p2) {
            authFormError.textContent = "兩次密碼不一致";
            return;
          }
          authSubmitBtn.disabled = true;
          await firebaseAuth.createUserWithEmailAndPassword(email, p1);
        } else {
          const email = authEmailLogin.value.trim();
          const pass = authPassLogin.value;
          if (!email || !pass) {
            authFormError.textContent = "請輸入電子郵件與密碼";
            return;
          }
          authSubmitBtn.disabled = true;
          await firebaseAuth.signInWithEmailAndPassword(email, pass);
        }
      } catch (e) {
        authFormError.textContent = authErrorMessage(e.code || "");
        console.error(e);
      } finally {
        authSubmitBtn.disabled = false;
      }
    });

    authSignOutBtn.addEventListener("click", async () => {
      try {
        await firebaseAuth.signOut();
        closeAuthModalIfOpen();
        showToast("已登出");
      } catch (e) {
        console.error(e);
        showToast("登出失敗");
      }
    });

    authSyncChoiceBtn.addEventListener("click", async () => {
      const u = firebaseAuth.currentUser;
      if (!u) return;
      authSyncChoiceBtn.disabled = true;
      try {
        await runInteractiveCloudSync(u);
        await refreshAuthLoggedPanel();
      } catch (e) {
        console.error(e);
        showToast("同步過程發生錯誤");
      } finally {
        authSyncChoiceBtn.disabled = false;
      }
    });

    firebaseAuth.onAuthStateChanged((user) => {
      if (!user) {
        refreshLoginSubtitles();
        return;
      }
      syncAuthModalLoggedStateIfOpen(user);
      refreshLoginSubtitles();
    });

    refresh();
    void bumpVisitorCounter();
  </script>
</body>
</html>
