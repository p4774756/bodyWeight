<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>體重與打卡</title>
  <style>
    :root {
      --bg: #f0fdfa;
      --surface: #ffffff;
      --text: #134e4a;
      --muted: #5f8a85;
      --accent: #0d9488;
      --accent-hover: #0f766e;
      --border: #ccfbf1;
      --danger: #dc2626;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(15, 118, 110, 0.08);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) calc(88px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    }
    .app-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 0;
    }
    .app-header-titles { flex: 1; min-width: 0; }
    .app-header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 4px;
      letter-spacing: -0.02em;
    }
    .app-header .subtitle { color: var(--muted); font-size: 0.875rem; margin: 0 0 20px; }
    .settings-btn {
      flex-shrink: 0;
      margin-top: 2px;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 700;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface);
      color: var(--accent);
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: var(--shadow);
      -webkit-tap-highlight-color: transparent;
    }
    .settings-btn:active { filter: brightness(0.97); }
    .app-header-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }
    .entry-open-btn {
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 700;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: var(--shadow);
      -webkit-tap-highlight-color: transparent;
    }
    .entry-open-btn:active { background: var(--accent-hover); transform: scale(0.98); }
    .goal-summary-card .goal-stats { margin-bottom: 0; }
    .goal-summary-card .encourage-line { margin-top: 14px; }
    details.list-fold {
      margin-bottom: 16px;
      padding: 0;
      overflow: hidden;
    }
    details.list-fold summary.list-fold-summary {
      list-style: none;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 1rem;
      -webkit-tap-highlight-color: transparent;
    }
    details.list-fold summary.list-fold-summary::-webkit-details-marker { display: none; }
    details.list-fold summary .list-fold-meta {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--muted);
    }
    details.list-fold[open] summary.list-fold-summary {
      border-bottom: 1px solid var(--border);
    }
    .list-fold-inner { padding: 0 18px 16px; }
    .list-fold-note {
      margin: 12px 0 0;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
    .delete-modal.entry-modal { z-index: 212; }
    .entry-modal .delete-modal-panel { max-width: 380px; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 380px) { .row { grid-template-columns: 1fr; } }
    input[type="date"],
    input[type="number"] {
      width: 100%;
      font-size: 1.05rem;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fafafa;
      color: var(--text);
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-color: var(--accent);
    }
    .btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
    }
    .btn:active { background: var(--accent-hover); transform: scale(0.98); }
    .btn-secondary {
      margin-top: 10px;
      background: #fff;
      color: var(--accent);
      border: 2px solid var(--accent);
    }
    .btn-secondary:active { background: #ecfdf5; }
    .btn-ghost {
      margin-top: 8px;
      width: 100%;
      padding: 10px;
      font-size: 0.85rem;
      color: var(--muted);
      background: transparent;
      border: none;
      text-decoration: underline;
      cursor: pointer;
      touch-action: manipulation;
    }
    .goal-stats { font-size: 0.95rem; line-height: 1.55; margin: 0 0 14px; }
    .goal-stats p { margin: 0 0 10px; }
    .goal-stats p:last-child { margin-bottom: 0; }
    .goal-stats .highlight { color: var(--accent); font-weight: 700; }
    .encourage-line {
      margin: 0;
      padding: 14px 14px 14px 16px;
      border-left: 4px solid var(--accent);
      background: rgba(13, 148, 136, 0.08);
      border-radius: 0 10px 10px 0;
      font-size: 0.95rem;
      line-height: 1.5;
      color: var(--text);
    }
    .chart-wrap {
      position: relative;
      height: 220px;
      margin-top: 8px;
    }
    @media (min-width: 480px) { .chart-wrap { height: 280px; } }
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .list-header h2 { font-size: 1rem; margin: 0; }
    .entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .entry:last-child { border-bottom: none; }
    .entry-date { font-weight: 600; }
    .entry-weight { color: var(--accent); font-variant-numeric: tabular-nums; }
    .entry-del {
      flex-shrink: 0;
      padding: 8px 12px;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--danger);
      cursor: pointer;
      touch-action: manipulation;
    }
    .empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 20px 8px; }
    .tabbar {
      position: fixed;
      z-index: 40;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -6px 24px rgba(15, 118, 110, 0.07);
    }
    .tabbar-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 10px 8px 12px;
      border: none;
      background: transparent;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .tabbar-btn[aria-selected="true"] {
      color: var(--accent);
    }
    .tabbar-icon {
      font-size: 1.35rem;
      line-height: 1;
    }
    .checkin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }
    .checkin-btn {
      min-height: 92px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 10px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .checkin-btn:active { transform: scale(0.97); }
    .checkin-btn-gym { background: linear-gradient(145deg, #dbeafe, #bfdbfe); }
    .checkin-btn-jog { background: linear-gradient(145deg, #d1fae5, #a7f3d0); }
    .checkin-btn-friends { background: linear-gradient(145deg, #fef3c7, #fde68a); }
    .checkin-btn-partner { background: linear-gradient(145deg, #fce7f3, #fbcfe8); }
    .checkin-emoji { font-size: 1.5rem; line-height: 1; }
    .checkin-label { text-align: center; line-height: 1.25; }
    .checkin-analytics { font-size: 0.9rem; line-height: 1.55; margin-bottom: 14px; }
    .checkin-analytics .ana-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .checkin-analytics .ana-row:last-child { border-bottom: none; }
    .checkin-analytics .ana-name { font-weight: 600; flex-shrink: 0; }
    .checkin-analytics .ana-meta { color: var(--muted); text-align: right; font-size: 0.82rem; }
    .checkin-subh {
      font-size: 0.85rem;
      margin: 0 0 8px;
      color: var(--muted);
      font-weight: 600;
    }
    .checkin-chart-wrap { height: 200px; margin-top: 4px; }
    .checkin-log {
      font-size: 0.88rem;
      color: var(--muted);
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .checkin-log:last-child { border-bottom: none; }
    .checkin-log strong { color: var(--text); }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(88px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(120px);
      background: var(--text);
      color: #fff;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.875rem;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s ease, opacity 0.25s ease;
      z-index: 10;
      max-width: calc(100vw - 32px);
      text-align: center;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .delete-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }
    .delete-modal.open { display: flex; }
    .delete-modal.settings-modal { z-index: 210; }
    .delete-modal-panel.settings-modal-panel {
      max-width: 400px;
      max-height: min(88dvh, 640px);
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }
    .settings-modal-scroll {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
    }
    .settings-modal-scroll .btn { margin-top: 14px; }
    .settings-modal-lead {
      margin: 0 0 16px;
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.45;
    }
    .settings-modal-scroll > h3 { margin: 0 0 6px; font-size: 1.1rem; }
    .btn-close-settings {
      width: 100%;
      margin: 0;
      padding: 14px 20px;
      border: none;
      border-top: 1px solid var(--border);
      background: #f8faf9;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
      border-radius: 0 0 var(--radius) var(--radius);
      touch-action: manipulation;
    }
    .btn-close-settings:active { background: #ecfdf5; }
    .delete-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
    }
    .delete-modal-panel {
      position: relative;
      width: 100%;
      max-width: 340px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
      border: 1px solid var(--border);
    }
    .delete-modal-panel h3 {
      margin: 0 0 10px;
      font-size: 1.1rem;
    }
    .delete-modal-panel p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }
    .delete-modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .delete-modal-actions button {
      padding: 12px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      touch-action: manipulation;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }
    .delete-modal-actions .btn-confirm-del {
      border: none;
      background: var(--danger);
      color: #fff;
    }
    .delete-modal-actions .btn-confirm-del:active {
      filter: brightness(0.92);
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-row">
      <div class="app-header-titles">
        <h1 id="appTitle">每日體重</h1>
        <p id="appSubtitle" class="subtitle">資料存在這台裝置上，不會上傳伺服器</p>
      </div>
      <div class="app-header-actions">
        <button type="button" class="entry-open-btn" id="entryOpenBtn" aria-haspopup="dialog" aria-controls="entryModal" aria-expanded="false">新增</button>
        <button type="button" class="settings-btn" id="settingsBtn" aria-haspopup="dialog" aria-controls="settingsModal" aria-expanded="false">設定</button>
      </div>
    </div>
  </header>

  <main class="app-main">
  <section id="viewWeight" class="app-view" role="tabpanel" aria-labelledby="tabWeight">
  <div class="card">
    <h2 style="margin:0 0 4px;font-size:1rem;">體重曲線</h2>
    <p class="subtitle" style="margin:0 0 8px;">依日期排序，至少兩筆會比較好看</p>
    <div class="chart-wrap">
      <canvas id="chart" aria-label="體重折線圖"></canvas>
    </div>
  </div>

  <div class="card goal-summary-card" id="goalSummaryCard">
    <div class="list-header">
      <h2>目標進度</h2>
    </div>
    <div id="goalSummaryMain" class="goal-stats"></div>
    <p id="encourageLineMain" class="encourage-line" aria-live="polite"></p>
  </div>

  <details class="card list-fold">
    <summary class="list-fold-summary">
      <span>紀錄列表</span>
      <span class="list-fold-meta" id="listFoldMeta">共 0 筆</span>
    </summary>
    <div class="list-fold-inner">
      <div id="list"></div>
      <p class="list-fold-note" id="listFoldNote" hidden></p>
    </div>
  </details>
  </section>

  <section id="viewCheckin" class="app-view" role="tabpanel" aria-labelledby="tabCheckin" hidden>
    <div class="card">
      <div class="list-header">
        <h2>一鍵打卡</h2>
      </div>
      <p class="subtitle" style="margin-top:0">按一下立刻記錄此刻（同一天可多次）</p>
      <div class="checkin-grid" id="checkinGrid"></div>
    </div>
    <div class="card">
      <div class="list-header">
        <h2>頻率與分析</h2>
      </div>
      <div id="checkinAnalytics" class="checkin-analytics"></div>
      <h3 class="checkin-subh">近 7 天各項次數</h3>
      <div class="chart-wrap checkin-chart-wrap">
        <canvas id="checkinChart" aria-label="近七天打卡次數"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="list-header">
        <h2>最近紀錄</h2>
      </div>
      <div id="checkinRecent"></div>
    </div>
  </section>
  </main>

  <nav class="tabbar" role="tablist" aria-label="主選單">
    <button type="button" class="tabbar-btn" role="tab" id="tabWeight" aria-controls="viewWeight" aria-selected="true">
      <span class="tabbar-icon" aria-hidden="true">⚖️</span>
      <span>體重</span>
    </button>
    <button type="button" class="tabbar-btn" role="tab" id="tabCheckin" aria-controls="viewCheckin" aria-selected="false">
      <span class="tabbar-icon" aria-hidden="true">✅</span>
      <span>打卡</span>
    </button>
  </nav>

  <div class="toast" id="toast" role="status"></div>

  <div id="entryModal" class="delete-modal entry-modal" hidden aria-hidden="true">
    <div class="delete-modal-backdrop" id="entryModalBackdrop" tabindex="-1"></div>
    <div class="delete-modal-panel" role="dialog" aria-modal="true" aria-labelledby="entryModalTitle">
      <h3 id="entryModalTitle" style="margin:0 0 14px;font-size:1.1rem;">新增體重紀錄</h3>
      <div class="row">
        <div>
          <label for="date">日期</label>
          <input type="date" id="date" />
        </div>
        <div>
          <label for="weight">體重（公斤）</label>
          <input type="number" id="weight" inputmode="decimal" step="0.1" min="1" max="500" placeholder="例如 65.5" />
        </div>
      </div>
      <button type="button" class="btn" id="saveBtn">儲存紀錄</button>
      <button type="button" class="btn-ghost" id="entryModalCancelBtn">取消</button>
    </div>
  </div>

  <div id="settingsModal" class="delete-modal settings-modal" hidden aria-hidden="true">
    <div class="delete-modal-backdrop" id="settingsModalBackdrop" tabindex="-1"></div>
    <div class="delete-modal-panel settings-modal-panel" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
      <div class="settings-modal-scroll">
        <h3 id="settingsModalTitle">體重目標</h3>
        <p class="settings-modal-lead">偶爾來調整目標或看進度即可，不必每天盯著。</p>
        <div class="row">
          <div>
            <label for="goalDate">目標日期</label>
            <input type="date" id="goalDate" />
          </div>
          <div>
            <label for="goalWeight">目標體重（公斤）</label>
            <input type="number" id="goalWeight" inputmode="decimal" step="0.1" min="1" max="500" placeholder="例如 62" />
          </div>
        </div>
        <button type="button" class="btn" id="goalSaveBtn">儲存目標</button>
        <button type="button" class="btn-ghost" id="goalClearBtn">清除目標</button>
        <div id="goalStats" class="goal-stats" style="margin-top:16px;"></div>
        <p id="encourageLine" class="encourage-line" aria-live="polite"></p>
      </div>
      <button type="button" class="btn-close-settings" id="settingsCloseBtn">關閉</button>
    </div>
  </div>

  <div id="deleteModal" class="delete-modal" hidden aria-hidden="true">
    <div class="delete-modal-backdrop" id="deleteModalBackdrop" tabindex="-1"></div>
    <div class="delete-modal-panel" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
      <h3 id="deleteModalTitle">刪除紀錄</h3>
      <p id="deleteModalMsg"></p>
      <div class="delete-modal-actions">
        <button type="button" id="deleteModalCancel">取消</button>
        <button type="button" class="btn-confirm-del" id="deleteModalOk">確定刪除</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const STORAGE_KEY = "bodyWeight.entries.v1";
    const GOAL_KEY = "bodyWeight.goal.v1";
    const CHECKIN_KEY = "bodyWeight.checkins.v1";
    const CHECK_KINDS = [
      { id: "gym", label: "重訓", emoji: "🏋️" },
      { id: "jog", label: "慢跑", emoji: "🏃" },
      { id: "friends", label: "看六人行", emoji: "📺" },
      { id: "partner", label: "跟女友做愛", emoji: "💕" },
    ];

    /** @typedef {{ date: string, weight: number }} Entry */
    /** @typedef {{ targetDate: string | null, targetWeight: number | null }} Goal */

    function loadEntries() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed
          .filter((e) => e && typeof e.date === "string" && typeof e.weight === "number")
          .map((e) => ({ date: e.date, weight: e.weight }));
      } catch {
        return [];
      }
    }

    /** @param {Entry[]} entries */
    function saveEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    /** @param {Entry[]} entries */
    function sortByDate(entries) {
      return [...entries].sort((a, b) => a.date.localeCompare(b.date));
    }

    /** @returns {Goal} */
    function loadGoal() {
      try {
        const raw = localStorage.getItem(GOAL_KEY);
        if (!raw) return { targetDate: null, targetWeight: null };
        const o = JSON.parse(raw);
        const targetDate =
          typeof o.targetDate === "string" && /^\d{4}-\d{2}-\d{2}$/.test(o.targetDate) ? o.targetDate : null;
        const tw = parseFloat(String(o.targetWeight ?? "").replace(",", "."));
        const targetWeight = !Number.isNaN(tw) && tw > 0 ? tw : null;
        return { targetDate, targetWeight };
      } catch {
        return { targetDate: null, targetWeight: null };
      }
    }

    /** @param {Goal} goal */
    function saveGoal(goal) {
      localStorage.setItem(GOAL_KEY, JSON.stringify(goal));
    }

    function loadCheckins() {
      try {
        const raw = localStorage.getItem(CHECKIN_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        const valid = new Set(CHECK_KINDS.map((k) => k.id));
        return parsed
          .filter((c) => c && typeof c.ts === "number" && typeof c.kind === "string" && valid.has(c.kind))
          .map((c) => ({ ts: c.ts, kind: c.kind }));
      } catch {
        return [];
      }
    }

    /** @param {{ ts: number, kind: string }[]} rows */
    function saveCheckins(rows) {
      localStorage.setItem(CHECKIN_KEY, JSON.stringify(rows.slice(-5000)));
    }

    function parseISODateLocal(iso) {
      const p = iso.split("-").map(Number);
      return new Date(p[0], p[1] - 1, p[2]);
    }

    /** @param {Entry[]} entries */
    function getLatestEntry(entries) {
      const s = sortByDate(entries);
      if (!s.length) return null;
      return s[s.length - 1];
    }

    const ENC = {
      noGoal: [
        "先為自己訂一個日期與數字吧，就像幫未來的你留一盞燈。",
        "有目標的路比較不容易迷路，從現在開始一點一點來。",
        "今天就可以填：想在哪一天看見什麼樣的自己？",
        "小小目標也是承諾，你值得一份對自己的溫柔約定。",
      ],
      noEntry: [
        "有了目標之後，開始記錄幾天的體重吧，線索會慢慢浮現。",
        "每一筆數字都是在對身體說：我在聽你說話。",
        "不用完美，只要誠實。今天先記一筆看看？",
        "曲線會起伏，但長期趨勢很誠實，我們一起把它畫出來。",
      ],
      needLose: [
        "差一點點也是進展，身體正在慢慢聽懂你的意圖。",
        "體重像海浪有起伏，你看的是整體方向，不是某一朵浪花。",
        "不必和別人比，你今天的曲線只屬於你。",
        "給自己多一點睡眠與水分，有時比多餓一餐更有用。",
        "只要持續紀錄，你就已經在做很多人做不來的事了。",
      ],
      belowTarget: [
        "你已經比目標更輕，若這不符合現在的計畫，隨時可以調整目標。",
        "數字之外，也留意力氣、心情與身體訊號，健康比體重更寬。",
        "太輕與太重一樣需要照顧，必要時諮詢專業也很有勇氣。",
        "目標可以改，健康優先，你永遠可以重新出發。",
      ],
      achieved: [
        "已經非常非常接近目標了，這很值得為自己拍拍手。",
        "讓人佩服的不是一次衝刺，而是你願意每天回來看看。",
        "你真的有在照顧自己，這一點比任何數字都重要。",
        "接下來好好維持，或為自己設下一個健康的新目標吧！",
      ],
      pastDate: [
        "目標日過了也別灰心，可以微調日期或體重，再出發一次。",
        "計畫永遠可以更新，重要的是你還在場上。",
        "重新訂一個讓自己睡得著、吃得飽的目標也很好。",
      ],
      genericClose: [
        "進步常常不是直線，而是迂迴上升，這很正常。",
        "閉上眼睛想像達標那天，醒來後今天的你仍然可以往前一步。",
      ],
    };

    /** @param {string[]} arr */
    function pickEncouragement(arr) {
      const i = Math.floor(Date.now() / 86400000) % arr.length;
      return arr[i];
    }

    function kindLabel(kind) {
      const k = CHECK_KINDS.find((x) => x.id === kind);
      return k ? k.label : kind;
    }

    function localDayKey(ts) {
      const d = new Date(ts);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    }

    /** @param {{ ts: number, kind: string }[]} checkins */
    function filterSinceDays(checkins, days) {
      const cutoff = Date.now() - days * 86400000;
      return checkins.filter((c) => c.ts >= cutoff);
    }

    const dateInput = document.getElementById("date");
    const weightInput = document.getElementById("weight");
    const saveBtn = document.getElementById("saveBtn");
    const listEl = document.getElementById("list");
    const toastEl = document.getElementById("toast");
    const chartCanvas = document.getElementById("chart");
    const deleteModal = document.getElementById("deleteModal");
    const deleteModalMsg = document.getElementById("deleteModalMsg");
    const deleteModalBackdrop = document.getElementById("deleteModalBackdrop");
    const deleteModalCancel = document.getElementById("deleteModalCancel");
    const deleteModalOk = document.getElementById("deleteModalOk");
    const goalDateInput = document.getElementById("goalDate");
    const goalWeightInput = document.getElementById("goalWeight");
    const goalSaveBtn = document.getElementById("goalSaveBtn");
    const goalClearBtn = document.getElementById("goalClearBtn");
    const goalStatsEl = document.getElementById("goalStats");
    const encourageLineEl = document.getElementById("encourageLine");
    const tabWeight = document.getElementById("tabWeight");
    const tabCheckin = document.getElementById("tabCheckin");
    const viewWeight = document.getElementById("viewWeight");
    const viewCheckin = document.getElementById("viewCheckin");
    const appTitle = document.getElementById("appTitle");
    const appSubtitle = document.getElementById("appSubtitle");
    const checkinGrid = document.getElementById("checkinGrid");
    const checkinAnalytics = document.getElementById("checkinAnalytics");
    const checkinRecent = document.getElementById("checkinRecent");
    const checkinCanvas = document.getElementById("checkinChart");
    const settingsModal = document.getElementById("settingsModal");
    const settingsModalBackdrop = document.getElementById("settingsModalBackdrop");
    const settingsCloseBtn = document.getElementById("settingsCloseBtn");
    const settingsBtn = document.getElementById("settingsBtn");
    const entryModal = document.getElementById("entryModal");
    const entryModalBackdrop = document.getElementById("entryModalBackdrop");
    const entryModalCancelBtn = document.getElementById("entryModalCancelBtn");
    const entryOpenBtn = document.getElementById("entryOpenBtn");
    const goalSummaryMainEl = document.getElementById("goalSummaryMain");
    const encourageLineMainEl = document.getElementById("encourageLineMain");
    const listFoldMeta = document.getElementById("listFoldMeta");
    const listFoldNote = document.getElementById("listFoldNote");

    const LIST_RECENT_MAX = 8;

    let pendingDeleteDate = null;

    function openEntryModal() {
      dateInput.value = todayISO();
      weightInput.value = "";
      entryModal.hidden = false;
      entryModal.classList.add("open");
      entryModal.setAttribute("aria-hidden", "false");
      entryOpenBtn.setAttribute("aria-expanded", "true");
      weightInput.focus();
    }

    function closeEntryModal() {
      entryModal.classList.remove("open");
      entryModal.hidden = true;
      entryModal.setAttribute("aria-hidden", "true");
      entryOpenBtn.setAttribute("aria-expanded", "false");
    }

    function openSettingsModal() {
      settingsModal.hidden = false;
      settingsModal.classList.add("open");
      settingsModal.setAttribute("aria-hidden", "false");
      settingsBtn.setAttribute("aria-expanded", "true");
      syncGoalFormFromStorage();
      renderGoalInsight();
    }

    function closeSettingsModal() {
      settingsModal.classList.remove("open");
      settingsModal.hidden = true;
      settingsModal.setAttribute("aria-hidden", "true");
      settingsBtn.setAttribute("aria-expanded", "false");
    }

    function openDeleteModal(date) {
      pendingDeleteDate = date;
      deleteModalMsg.textContent = `確定要刪除 ${date} 的體重紀錄嗎？此動作無法復原。`;
      deleteModal.hidden = false;
      deleteModal.classList.add("open");
      deleteModal.setAttribute("aria-hidden", "false");
    }

    function closeDeleteModal() {
      pendingDeleteDate = null;
      deleteModal.classList.remove("open");
      deleteModal.hidden = true;
      deleteModal.setAttribute("aria-hidden", "true");
    }

    function runPendingDelete() {
      if (!pendingDeleteDate) return;
      const date = pendingDeleteDate;
      closeDeleteModal();
      const entries = loadEntries().filter((e) => e.date !== date);
      saveEntries(entries);
      showToast("已刪除");
      refresh();
    }

    deleteModalCancel.addEventListener("click", closeDeleteModal);
    deleteModalBackdrop.addEventListener("click", closeDeleteModal);
    deleteModalOk.addEventListener("click", runPendingDelete);
    entryOpenBtn.addEventListener("click", openEntryModal);
    entryModalBackdrop.addEventListener("click", closeEntryModal);
    entryModalCancelBtn.addEventListener("click", closeEntryModal);
    settingsBtn.addEventListener("click", openSettingsModal);
    settingsModalBackdrop.addEventListener("click", closeSettingsModal);
    settingsCloseBtn.addEventListener("click", closeSettingsModal);
    document.addEventListener("keydown", (ev) => {
      if (ev.key !== "Escape") return;
      if (entryModal.classList.contains("open")) {
        ev.preventDefault();
        closeEntryModal();
        return;
      }
      if (deleteModal.classList.contains("open")) {
        ev.preventDefault();
        closeDeleteModal();
        return;
      }
      if (settingsModal.classList.contains("open")) {
        ev.preventDefault();
        closeSettingsModal();
      }
    });

    function todayISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function daysFromTodayTo(targetIso) {
      const a = parseISODateLocal(todayISO());
      const b = parseISODateLocal(targetIso);
      return Math.round((b.getTime() - a.getTime()) / 86400000);
    }

    function syncGoalFormFromStorage() {
      const g = loadGoal();
      goalDateInput.value = g.targetDate || "";
      goalWeightInput.value = g.targetWeight != null ? String(g.targetWeight) : "";
    }

    syncGoalFormFromStorage();

    function renderGoalInsight() {
      const goal = loadGoal();
      const entries = loadEntries();

      if (!goal.targetDate || goal.targetWeight == null) {
        goalStatsEl.innerHTML =
          '<p class="empty" style="padding:8px 0;margin:0;">填寫目標日期與目標體重並儲存後，這裡會顯示還差多少與倒數天數。</p>';
        goalSummaryMainEl.innerHTML =
          '<p class="empty" style="padding:0;margin:0;">尚未設定目標，請點右上角「設定」新增日期與目標體重。</p>';
        const enc = pickEncouragement(ENC.noGoal);
        encourageLineEl.textContent = enc;
        encourageLineMainEl.textContent = enc;
        return;
      }

      const remain = daysFromTodayTo(goal.targetDate);
      let dayHtml = "";
      if (remain > 0) {
        dayHtml = `<p>距離目標日（${goal.targetDate}）還有 <span class="highlight">${remain}</span> 天。</p>`;
      } else if (remain === 0) {
        dayHtml = `<p>目標日就是<span class="highlight">今天</span>（${goal.targetDate}）。</p>`;
      } else {
        dayHtml = `<p>目標日（${goal.targetDate}）已過 <span class="highlight">${-remain}</span> 天。</p>`;
      }

      const latest = getLatestEntry(entries);
      let weightHtml = "";
      /** @type {string[]} */
      let encPool = ENC.genericClose;

      if (!latest) {
        weightHtml = "<p>尚無體重紀錄，先記幾筆後就能看到與目標的距離。</p>";
        encPool = ENC.noEntry;
      } else {
        const cur = latest.weight;
        const diff = cur - goal.targetWeight;
        const abs = Math.abs(diff);
        if (abs < 0.2) {
          weightHtml = `<p>最近一筆：<strong>${cur.toFixed(1)} kg</strong>（${latest.date}），與目標 <strong>${goal.targetWeight.toFixed(1)} kg</strong> 幾乎一樣。</p>`;
          encPool = ENC.achieved;
        } else if (diff > 0) {
          weightHtml = `<p>最近一筆：<strong>${cur.toFixed(1)} kg</strong>（${latest.date}）。<br>與目標體重相比，還多出 <span class="highlight">${abs.toFixed(1)} kg</span>。</p>`;
          encPool = ENC.needLose;
        } else {
          weightHtml = `<p>最近一筆：<strong>${cur.toFixed(1)} kg</strong>（${latest.date}）。<br>已比目標再輕約 <span class="highlight">${abs.toFixed(1)} kg</span>。</p>`;
          encPool = ENC.belowTarget;
        }
      }

      if (remain < 0 && latest) {
        const diff = latest.weight - goal.targetWeight;
        if (Math.abs(diff) >= 0.2) encPool = ENC.pastDate;
      }

      const statsJoined = dayHtml + weightHtml;
      const encText = pickEncouragement(encPool);
      goalStatsEl.innerHTML = statsJoined;
      goalSummaryMainEl.innerHTML = statsJoined;
      encourageLineEl.textContent = encText;
      encourageLineMainEl.textContent = encText;
    }

    let chartInstance = null;
    let checkinChartInstance = null;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("show"), 2200);
    }

    function renderList(entries) {
      const sorted = sortByDate(entries).reverse();
      const total = sorted.length;
      listFoldMeta.textContent = total === 0 ? "尚無紀錄" : `共 ${total} 筆`;

      if (total === 0) {
        listEl.innerHTML = '<p class="empty" style="padding:12px 0;">尚無紀錄，點「新增」開始</p>';
        listFoldNote.hidden = true;
        return;
      }

      const slice = sorted.slice(0, LIST_RECENT_MAX);
      listEl.innerHTML = slice
        .map(
          (e) => `
        <div class="entry" data-date="${e.date}">
          <div>
            <div class="entry-date">${e.date}</div>
            <div class="entry-weight">${e.weight.toFixed(1)} kg</div>
          </div>
          <button type="button" class="entry-del" data-date="${e.date}">刪除</button>
        </div>`
        )
        .join("");

      if (total > LIST_RECENT_MAX) {
        listFoldNote.textContent = `僅列出最近 ${LIST_RECENT_MAX} 筆，其餘 ${total - LIST_RECENT_MAX} 筆仍安全存在手機裡。`;
        listFoldNote.hidden = false;
      } else {
        listFoldNote.hidden = true;
      }
    }

    function renderChart(entries) {
      const sorted = sortByDate(entries);
      const labels = sorted.map((e) => e.date);
      const data = sorted.map((e) => e.weight);
      const goal = loadGoal();
      const showTargetLine = goal.targetWeight != null && labels.length > 0;

      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }

      if (sorted.length === 0) {
        chartInstance = new Chart(chartCanvas, {
          type: "line",
          data: { labels: [], datasets: [{ data: [] }] },
          options: { plugins: { legend: { display: false } } },
        });
        return;
      }

      const datasets = [
        {
          label: "體重 (kg)",
          data,
          borderColor: "#0d9488",
          backgroundColor: "rgba(13, 148, 136, 0.12)",
          fill: true,
          tension: 0.25,
          pointRadius: 4,
          pointHoverRadius: 6,
          borderWidth: 2,
        },
      ];
      if (showTargetLine && goal.targetWeight != null) {
        datasets.push({
          label: "目標體重",
          data: labels.map(() => goal.targetWeight),
          borderColor: "#ea580c",
          backgroundColor: "transparent",
          borderDash: [6, 4],
          pointRadius: 0,
          fill: false,
          tension: 0,
          borderWidth: 2,
        });
      }

      chartInstance = new Chart(chartCanvas, {
        type: "line",
        data: {
          labels,
          datasets,
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { intersect: false, mode: "index" },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxRotation: 45, minRotation: 0, font: { size: 10 } },
            },
            y: {
              beginAtZero: false,
              ticks: { font: { size: 11 } },
              grid: { color: "rgba(20, 78, 74, 0.08)" },
            },
          },
          plugins: {
            legend: { display: showTargetLine },
            tooltip: {
              callbacks: {
                label(ctx) {
                  const v = ctx.parsed.y;
                  return v != null ? `體重：${Number(v).toFixed(1)} kg` : "";
                },
              },
            },
          },
        },
      });
    }

    function refresh() {
      const entries = loadEntries();
      renderList(entries);
      renderChart(entries);
      renderGoalInsight();
    }

    goalSaveBtn.addEventListener("click", () => {
      const td = goalDateInput.value;
      const tw = parseFloat(String(goalWeightInput.value).replace(",", "."));
      if (!td) {
        showToast("請選擇目標日期");
        return;
      }
      if (Number.isNaN(tw) || tw <= 0) {
        showToast("請輸入有效目標體重");
        return;
      }
      saveGoal({ targetDate: td, targetWeight: tw });
      showToast("目標已儲存");
      refresh();
    });

    goalClearBtn.addEventListener("click", () => {
      saveGoal({ targetDate: null, targetWeight: null });
      goalDateInput.value = "";
      goalWeightInput.value = "";
      showToast("已清除目標");
      refresh();
    });

    saveBtn.addEventListener("click", () => {
      const date = dateInput.value;
      const w = parseFloat(String(weightInput.value).replace(",", "."));
      if (!date) {
        showToast("請選擇日期");
        return;
      }
      if (Number.isNaN(w) || w <= 0) {
        showToast("請輸入有效體重");
        return;
      }
      let entries = loadEntries();
      const idx = entries.findIndex((e) => e.date === date);
      if (idx >= 0) {
        entries[idx] = { date, weight: w };
        showToast("已更新該日紀錄");
      } else {
        entries.push({ date, weight: w });
        showToast("已儲存");
      }
      saveEntries(entries);
      weightInput.value = "";
      closeEntryModal();
      refresh();
    });

    listEl.addEventListener("click", (ev) => {
      const btn = ev.target.closest(".entry-del");
      if (!btn) return;
      const date = btn.getAttribute("data-date");
      if (!date) return;
      openDeleteModal(date);
    });

    function renderCheckinPanel() {
      const all = loadCheckins();
      const c7 = filterSinceDays(all, 7);
      const c30 = filterSinceDays(all, 30);

      const counts7 = CHECK_KINDS.map((k) => c7.filter((c) => c.kind === k.id).length);
      const counts30 = CHECK_KINDS.map((k) => c30.filter((c) => c.kind === k.id).length);
      const totalAll = CHECK_KINDS.map((k) => all.filter((c) => c.kind === k.id).length);

      let html = "";
      CHECK_KINDS.forEach((k, i) => {
        const activeDays7 = new Set(c7.filter((c) => c.kind === k.id).map((c) => localDayKey(c.ts))).size;
        const perWeek = (counts30[i] / (30 / 7)).toFixed(1);
        html += `<div class="ana-row"><span class="ana-name">${k.emoji} ${k.label}</span><span class="ana-meta">近7天 ${counts7[i]} 次 · ${activeDays7} 天有做<br>近30天 ${counts30[i]} 次 · 約每週 ${perWeek} 次<br>累計 ${totalAll[i]} 次</span></div>`;
      });

      const sum7 = counts7.reduce((a, b) => a + b, 0);
      if (sum7 === 0) {
        html += '<p class="empty" style="padding:8px 0;margin:0;">近 7 天尚無打卡，按上方按鈕開始吧。</p>';
      } else {
        const bestIdx = counts7.indexOf(Math.max(...counts7));
        html += `<p style="margin:12px 0 0;font-size:0.88rem;color:var(--muted);">近一週以「<strong style="color:var(--text)">${CHECK_KINDS[bestIdx].label}</strong>」最多次（${counts7[bestIdx]} 次）。</p>`;
      }
      checkinAnalytics.innerHTML = html;

      if (checkinChartInstance) {
        checkinChartInstance.destroy();
        checkinChartInstance = null;
      }
      checkinChartInstance = new Chart(checkinCanvas, {
        type: "bar",
        data: {
          labels: CHECK_KINDS.map((k) => k.label),
          datasets: [
            {
              label: "近 7 天次數",
              data: counts7,
              backgroundColor: ["#60a5fa", "#34d399", "#fbbf24", "#f472b6"],
              borderRadius: 6,
              borderSkipped: false,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: "y",
          scales: {
            x: {
              beginAtZero: true,
              ticks: { stepSize: 1, precision: 0 },
              grid: { color: "rgba(20, 78, 74, 0.08)" },
            },
            y: { grid: { display: false }, ticks: { font: { size: 11 } } },
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label(ctx) {
                  const v = ctx.parsed.x;
                  return v != null ? `${v} 次` : "";
                },
              },
            },
          },
        },
      });

      const recent = [...all].sort((a, b) => b.ts - a.ts).slice(0, 25);
      if (recent.length === 0) {
        checkinRecent.innerHTML = '<p class="empty">尚無紀錄</p>';
      } else {
        const fmt = new Intl.DateTimeFormat("zh-Hant", {
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
        checkinRecent.innerHTML = recent
          .map((c) => {
            const lab = kindLabel(c.kind);
            return `<div class="checkin-log"><strong>${lab}</strong><span>${fmt.format(c.ts)}</span></div>`;
          })
          .join("");
      }
    }

    function initCheckinGrid() {
      checkinGrid.innerHTML = CHECK_KINDS.map(
        (k) =>
          `<button type="button" class="checkin-btn checkin-btn-${k.id}" data-kind="${k.id}"><span class="checkin-emoji">${k.emoji}</span><span class="checkin-label">${k.label}</span></button>`
      ).join("");
      checkinGrid.addEventListener("click", (ev) => {
        const btn = ev.target.closest(".checkin-btn[data-kind]");
        if (!btn) return;
        const kind = btn.getAttribute("data-kind");
        if (!kind) return;
        const rows = loadCheckins();
        rows.push({ ts: Date.now(), kind });
        saveCheckins(rows);
        showToast(`已打卡：${kindLabel(kind)}`);
        renderCheckinPanel();
      });
    }

    function switchMainTab(which) {
      const onWeight = which === "weight";
      viewWeight.hidden = !onWeight;
      viewCheckin.hidden = onWeight;
      tabWeight.setAttribute("aria-selected", onWeight ? "true" : "false");
      tabCheckin.setAttribute("aria-selected", onWeight ? "false" : "true");
      if (onWeight) {
        appTitle.textContent = "每日體重";
        appSubtitle.textContent = "資料存在這台裝置上，不會上傳伺服器";
      } else {
        appTitle.textContent = "習慣打卡";
        appSubtitle.textContent = "打卡資料僅存在此裝置，可在此查看頻率與紀錄";
        requestAnimationFrame(() => {
          requestAnimationFrame(() => renderCheckinPanel());
        });
      }
    }

    tabWeight.addEventListener("click", () => switchMainTab("weight"));
    tabCheckin.addEventListener("click", () => switchMainTab("checkin"));

    initCheckinGrid();
    refresh();
  </script>
</body>
</html>
